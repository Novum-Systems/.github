name: Feature Request
description: Suggest a feature
title: "[FEATURE] "
labels: ["enhancement", "status:backlog"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution

  - type: textarea
    id: value
    attributes:
      label: Value / Impact